<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f6f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="记账" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>每月 20 号记账</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-band">
        <div>
          <p class="eyebrow">发薪日：每月 20 号</p>
          <h1>记账</h1>
          <p class="period" id="periodText"></p>
        </div>
        <div class="date-pill" id="todayText"></div>
      </section>

      <section class="summary-grid" aria-label="账户概览">
        <article class="summary-tile primary">
          <span>本账期剩余</span>
          <strong id="remainingAmount">¥0.00</strong>
          <small id="remainingHint"></small>
        </article>
        <article class="summary-tile">
          <span>本账期收入</span>
          <strong id="incomeAmount">¥0.00</strong>
        </article>
        <article class="summary-tile">
          <span>本账期消费</span>
          <strong id="expenseAmount">¥0.00</strong>
        </article>
        <article class="summary-tile accent">
          <span>已结转储蓄</span>
          <strong id="savingsAmount">¥0.00</strong>
          <small>20 号前剩余的钱会进入这里</small>
        </article>
      </section>

      <section class="work-area">
        <form class="entry-panel" id="entryForm">
          <h2>新增记录</h2>
          <label>
            类型
            <select id="typeInput">
              <option value="expense">消费</option>
              <option value="income">收入</option>
            </select>
          </label>
          <label>
            金额
            <input id="amountInput" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required />
          </label>
          <label>
            日期
            <input id="dateInput" type="date" required />
          </label>
          <label>
            分类
            <input id="categoryInput" type="text" maxlength="20" placeholder="餐饮 / 交通 / 工资" />
          </label>
          <label>
            备注
            <input id="noteInput" type="text" maxlength="60" placeholder="可选" />
          </label>
          <button class="primary-button" type="submit">保存记录</button>
        </form>

        <section class="records-panel">
          <div class="panel-head">
            <h2>每日记录</h2>
            <div class="toolbar">
              <select id="filterInput" aria-label="筛选记录">
                <option value="cycle">本账期</option>
                <option value="all">全部</option>
                <option value="expense">只看消费</option>
                <option value="income">只看收入</option>
              </select>
              <button class="ghost-button" id="exportButton" type="button">导出</button>
            </div>
          </div>
          <div class="records-list" id="recordsList"></div>
          <p class="empty-state" id="emptyState">还没有记录，先记下一笔吧。</p>
        </section>
      </section>

      <section class="settlement-band">
        <div>
          <h2>账期结转</h2>
          <p id="settlementText"></p>
        </div>
        <button class="secondary-button" id="settleButton" type="button">手动结转过往账期</button>
      </section>
    </main>

    <script src="web-app.js"></script>
  </body>
</html>
